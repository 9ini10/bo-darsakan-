<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do you love me?</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fae4e8;
            font-family: 'Comic Sans MS', 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        .container img {
            width: 300px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3rem;
            color: #1a1a1a;
            margin-bottom: 30px;
        }

        .buttons-container {
            position: relative;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 12px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background-color: #d17585;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(209, 117, 133, 0.4);
            transition: transform 0.2s, background-color 0.2s;
        }

        #yes-btn:hover {
            background-color: #b85e6d;
            transform: scale(1.1);
        }

        #no-btn {
            position: relative;
            transition: 0.1s;
        }
    </style>
</head>
<body>

    <div class="container">
        <img id="main-image" src="image1.gif" alt="Cute Bear">
        
        <h1 id="question">Do you love me?</h1>
        
        <div class="buttons-container">
            <button id="yes-btn">Yes</button>
            <button id="no-btn">No</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const mainImage = document.getElementById('main-image');
        const question = document.getElementById('question');

        // پێناسەکردنی دەنگەکە لێرەدا
        const funnySound = new Audio('sound.mp3');

        noBtn.addEventListener('mouseover', () => {
            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';

            // لێدانی دەنگەکە لە کاتی ڕاکردنی دوگمەکە
            funnySound.play().catch(error => {
                // ئەمە بۆ ئەوەیە ئەگەر وێبگەڕەکە ڕێگری کرد لە لێدانی دەنگ پێش ئەوەی بەکارهێنەر کلیک بکات، کێشە دروست نەبێت
                console.log("پێویستە بەکارهێنەر یەکەم جار کلیکێکی شاشەکە بکات بۆ ئەوەی دەنگەکە کار بکات");
            });
        });

        yesBtn.addEventListener('click', () => {
            question.innerHTML = "I knew it! I love you too! ❤️";
            yesBtn.style.display = 'none';
            noBtn.style.display = 'none';
            
            // ناوی وێنەی دووەم
            mainImage.src = "image2.gif";
        });
    </script>

</body>
</html>
