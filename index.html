<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Do you love me?</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fae4e8;
            font-family: 'Comic Sans MS', 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            touch-action: none; /* بۆ ئەوەی شاشەکە لە مۆبایل نەجوڵێت */
        }

        .container {
            text-align: center;
        }

        .container img {
            width: 300px;
            max-width: 90%;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3rem;
            color: #1a1a1a;
            margin-bottom: 30px;
        }

        .buttons-container {
            position: relative;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 12px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background-color: #d17585;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(209, 117, 133, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            -webkit-user-select: none;
            user-select: none;
        }

        #yes-btn:hover {
            background-color: #b85e6d;
            transform: scale(1.1);
        }

        #no-btn {
            position: relative;
            transition: 0.1s;
        }
    </style>
</head>
<body>

    <div class="container">
        <img id="main-image" src="image1.gif" alt="Cute Bear">
        
        <h1 id="question">Do you love me?</h1>
        
        <div class="buttons-container">
            <button id="yes-btn">Yes</button>
            <button id="no-btn">No</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const mainImage = document.getElementById('main-image');
        const question = document.getElementById('question');

        const funnySound = new Audio('sound.mp3');

        // دروستکردنی فەنکشنێک کە هەم بۆ ماوسە هەم بۆ پەنجەی مۆبایل
        function moveButton(event) {
            // ئەمە زۆر گرنگە بۆ مۆبایل: ڕێگری دەکات لەوەی وەکو کلیکێکی ئاسایی بخوێندرێتەوە
            if (event.type === 'touchstart') {
                event.preventDefault();
            }

            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;

            // بۆ ئەوەی دوگمەکە نەچێتە دەرەوەی شاشەکە
            const safeX = Math.max(0, maxX - 20);
            const safeY = Math.max(0, maxY - 20);

            const randomX = Math.floor(Math.random() * safeX);
            const randomY = Math.floor(Math.random() * safeY);

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';

            funnySound.play().catch(error => {
                console.log("پێویستە بەکارهێنەر یەکەم جار کلیکێکی شاشەکە بکات بۆ ئەوەی دەنگەکە کار بکات");
            });
        }

        // کارپێکردنی فەنکشنەکە بۆ ماوس (لەسەر کۆمپیوتەر)
        noBtn.addEventListener('mouseover', moveButton);
        
        // کارپێکردنی فەنکشنەکە بۆ پەنجە (لەسەر مۆبایل)
        noBtn.addEventListener('touchstart', moveButton);

        yesBtn.addEventListener('click', () => {
            question.innerHTML = "I knew it! I love you too! ❤️";
            yesBtn.style.display = 'none';
            noBtn.style.display = 'none';
            mainImage.src = "image2.gif";
        });
    </script>

</body>
</html>
