<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Do you love me?</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* بەکارهێنانی dvh زۆر باشترە بۆ شاشەی مۆبایل */
            height: 100vh;
            height: 100dvh; 
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fae4e8;
            font-family: 'Comic Sans MS', 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            touch-action: none;
            position: relative; 
        }

        .container {
            text-align: center;
            padding-bottom: 60px; /* مەودای زیاتر بۆ ئەوەی لە مۆبایل تێکەڵ نەبن */
        }

        .container img {
            width: 300px;
            max-width: 90%;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3rem;
            color: #1a1a1a;
            margin-bottom: 30px;
        }

        .buttons-container {
            position: relative;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 12px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background-color: #d17585;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(209, 117, 133, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            -webkit-user-select: none;
            user-select: none;
        }

        #yes-btn:hover {
            background-color: #b85e6d;
            transform: scale(1.1);
        }

        #no-btn {
            position: relative;
            transition: 0.1s;
            z-index: 100; 
        }

        /* ------------------------------------- */
        /* چارەسەری فوتەرەکە بۆ مۆبایل */
        /* ------------------------------------- */
        footer {
            position: fixed; /* گۆڕدرا بۆ fixed بۆ ئەوەی هەرگیز وون نەبێت */
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px; 
            z-index: 1000; /* دڵنیابوون لەوەی هەمیشە لە پێشەوەیە */
        }

        footer p {
            margin: 0; 
            font-size: 1rem;
            color: #b85e6d;
            font-weight: bold;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        footer a {
            text-decoration: none; 
            color: #d17585;
            font-weight: 900;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: rgba(255, 255, 255, 0.6); 
            padding: 6px 15px;
            border-radius: 20px;
            letter-spacing: 1px;
            box-shadow: 0 3px 10px rgba(209, 117, 133, 0.15);
            transition: all 0.3s ease;
        }

        footer a:hover {
            background-color: #d17585;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(209, 117, 133, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <img id="main-image" src="image1.gif" alt="Cute Bear">
        
        <h1 id="question">Do you love me?</h1>
        
        <div class="buttons-container">
            <button id="yes-btn">Yes</button>
            <button id="no-btn">No</button>
        </div>
    </div>

    <footer> 
        <p class="lang-text" data-ku="پەرەپێدراوە لەلایەن" data-en="Powered by">پەرەپێدراوە لەلایەن</p>
        <a href="https://t.me/ebol_4" target="_blank">E B O L A</a>
    </footer>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const mainImage = document.getElementById('main-image');
        const question = document.getElementById('question');

        const funnySound = new Audio('sound.mp3');

        function moveButton(event) {
            if (event.type === 'touchstart') {
                event.preventDefault();
            }

            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;

            const safeX = Math.max(0, maxX - 20);
            /* مەوداکەم زیاتر کرد بۆ ئەوەی دوگمەکە هەرگیز نەچێتە سەر ناوەکەت */
            const safeY = Math.max(0, maxY - 90); 

            const randomX = Math.floor(Math.random() * safeX);
            const randomY = Math.floor(Math.random() * safeY);

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';

            funnySound.play().catch(error => {
                console.log("پێویستە بەکارهێنەر یەکەم جار کلیکێکی شاشەکە بکات بۆ ئەوەی دەنگەکە کار بکات");
            });
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', moveButton);

        yesBtn.addEventListener('click', () => {
            question.innerHTML = "I knew it! I love you too! ❤️";
            yesBtn.style.display = 'none';
            noBtn.style.display = 'none';
            mainImage.src = "image2.gif";
        });
    </script>

</body>
</html>
