<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Do you love me?</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fae4e8;
            font-family: 'Comic Sans MS', 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            touch-action: none; /* ئەمەم زیاد کردووە بۆ ئەوەی لە مۆبایل شاشەکە نەجوڵێت */
        }

        .container {
            text-align: center;
        }

        .container img {
            width: 300px;
            max-width: 90%; /* بۆ ئەوەی لە شاشەی بچووکدا وێنەکە تێک نەچێت */
            border-radius: 15px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: #1a1a1a;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .buttons-container {
            position: relative;
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 60px; /* جێگیرکردنی بەرزییەکەی بۆ ئەوەی دوگمەکان شوێنیان تێک نەچێت */
        }

        button {
            padding: 12px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background-color: #d17585;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(209, 117, 133, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            /* ڕێگریکردن لە دیاریکردنی تێکستەکە لە کاتی پەنجەدان */
            -webkit-user-select: none;
            user-select: none; 
        }

        #yes-btn:hover {
            background-color: #b85e6d;
            transform: scale(1.1);
        }

        #no-btn {
            position: absolute; /* گۆڕیم بۆ Absolute بۆ ئەوەی لە مۆبایل کێشە دروست نەکات */
            transition: 0.1s;
        }
    </style>
</head>
<body>

    <div class="container">
        <img id="main-image" src="image1.gif" alt="Cute Bear">
        
        <h1 id="question">Do you love me?</h1>
        
        <div class="buttons-container">
            <button id="yes-btn">Yes</button>
            <button id="no-btn">No</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const mainImage = document.getElementById('main-image');
        const question = document.getElementById('question');

        // فەنکشنێک بۆ ڕاکردنی دوگمەکە
        function moveNoButton(e) {
            // ڕێگری دەکات لەوەی پەنجەدانەکە وەک کلیکێکی ئاسایی بخوێندرێتەوە
            if (e) {
                e.preventDefault(); 
            }

            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;

            // دروستکردنی کەمێک بۆشایی بۆ ئەوەی نەچێتە دەرەوەی شاشەکە
            const safeX = Math.max(0, maxX - 20);
            const safeY = Math.max(0, maxY - 20);

            const randomX = Math.floor(Math.random() * safeX);
            const randomY = Math.floor(Math.random() * safeY);

            // دانانی دوگمەکە لە شوێنە نوێیەکە
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // کاتێک بە ماوس دەچیتە سەری (بۆ کۆمپیوتەر)
        noBtn.addEventListener('mouseover', moveNoButton);
        
        // کاتێک هەوڵ دەدەیت پەنجەی لێ بدەیت (بۆ مۆبایل)
        noBtn.addEventListener('touchstart', moveNoButton);

        // کۆدی داگرتنی بەڵێ
        yesBtn.addEventListener('click', () => {
            question.innerHTML = "I knew it! I love you too! ❤️";
            yesBtn.style.display = 'none';
            noBtn.style.display = 'none';
            
            // ناوی وێنەکەی دووەمت دابنێ (image2.gif)
            mainImage.src = "image2.gif";
        });
    </script>

</body>
</html>
